name: svcmonitor

services:
  svcmonitor:
    build: .
    ports:
      - "1027:1025"
    environment:
      - TZ=Europe/Berlin
    networks:
      - monitor
      - svcmonitor-observability
    restart: unless-stopped

networks:
  monitor:
    external: true
  svcmonitor-observability:
    external: true
