name: svcmonitor

services:
  svcmonitor:
    build: .
    container_name: svcmonitor
    volumes:
      - ./services.yaml:/usr/src/app/services.yaml
    environment:
      - TZ=Europe/Berlin
    networks:
      - monitor
      - svcmonitor-observability
    restart: unless-stopped

networks:
  monitor:
    external: true
  svcmonitor-observability:
    external: true
