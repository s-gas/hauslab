events {}

http {
    server {
        server_name grafana.hauslab;
        listen 80;

        location / {
            proxy_set_header Host $host;
            proxy_pass http://grafana:3000;
        }
    }
    server {
        server_name prometheus.hauslab;
        listen 80;

        location / {
            proxy_set_header Host $host;
            proxy_pass http://prometheus:9090;
        }
    }
}
