name: observability

services:
  prometheus:
    image: prom/prometheus:v3.11.1
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - monitor
      - sysmetrics-observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.4
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitor
      - sysmetrics-observability
    secrets:
      - grafana_password
    environment:
      - GF_SECURITY_ADMIN_PASSWORD__FILE=/run/secrets/grafana_password
    restart: unless-stopped

volumes:
  prometheus_data: {}
  grafana_data: {}

secrets:
  grafana_password:
    file: secrets/grafana_password.txt

networks:
  monitor:
    external: true
  sysmetrics-observability:
    external: true
