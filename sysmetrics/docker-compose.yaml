name: sysmetrics

services:
  metrics-server:
    build: ./metrics-server
    ports:
      - "1024:1024"
    volumes:
      - /proc:/proc
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped

volumes:
  prometheus_data:
